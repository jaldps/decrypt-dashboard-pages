<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decrypt Analytics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.gate{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px;width:360px;text-align:center}
.gate h1{font-size:1.4rem;font-weight:700;margin-bottom:6px}
.gate h1 span{color:#58a6ff}
.gate p{color:#8b949e;font-size:.85rem;margin-bottom:24px}
.gate input{width:100%;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:10px 14px;border-radius:6px;font-size:1rem;outline:none;margin-bottom:12px}
.gate input:focus{border-color:#58a6ff}
.gate button{width:100%;background:#1f6feb;border:none;color:#fff;padding:11px;border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer}
.gate button:hover{background:#388bfd}
.gate .err{color:#f85149;font-size:.82rem;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="gate">
  <h1>Decrypt <span>Analytics</span></h1>
  <p>Enter password to access the dashboard</p>
  <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
  <button id="btn" onclick="unlock()">Access Dashboard</button>
  <div class="err" id="err">Incorrect password. Please try again.</div>
</div>
